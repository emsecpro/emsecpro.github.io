<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RedOps — Pentest Cheatsheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #12151c;
    --bg3: #1a1e28;
    --border: #252a36;
    --text: #e2e8f0;
    --muted: #6b7a99;
    --accent: #e05c3a;
    --accent2: #f59a4f;
    --green: #3adc8a;
    --blue: #5b9cf6;
    --tag-bg: #1e2533;
    --tag-text: #8fa3cc;
    --card-hover: #161b26;
    --input-bg: #0f1219;
    --copied: #3adc8a;
    color-scheme: dark;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f7;
      --bg2: #ffffff;
      --bg3: #eef0f4;
      --border: #d4d8e2;
      --text: #1a1e2e;
      --muted: #6b7a99;
      --accent: #d44e2a;
      --accent2: #e08a30;
      --green: #1f9e5e;
      --blue: #2e6fd4;
      --tag-bg: #e6eaf5;
      --tag-text: #4a5980;
      --card-hover: #f0f2f8;
      --input-bg: #ffffff;
      --copied: #1f9e5e;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ─── Header ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 56px;
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 14px;
  }

  #searchInput {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 36px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }

  #searchInput::placeholder { color: var(--muted); }
  #searchInput:focus { border-color: var(--accent); }

  /* ─── Variables Panel ─── */
  .vars-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }

  .vars-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 12px 24px;
  }

  .vars-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .vars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }

  .var-field {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .var-field label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }

  .var-field input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }

  .var-field input:focus { border-color: var(--accent2); }
  .var-field input::placeholder { color: var(--muted); }

  /* ─── Main ─── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  .results-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 18px;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .results-meta span {
    color: var(--accent2);
    font-weight: 700;
  }

  /* ─── Tool Cards ─── */
  .tool-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color .15s;
  }

  .tool-card:hover { border-color: var(--accent); }

  .tool-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    background: var(--bg3);
    transition: background .12s;
  }

  .tool-header:hover { background: var(--card-hover); }

  .tool-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent2);
    flex-shrink: 0;
  }

  .tool-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    flex: 1;
  }

  .tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .tool-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .chevron {
    flex-shrink: 0;
    color: var(--muted);
    transition: transform .2s;
    font-size: 12px;
  }

  .tool-card.open .chevron { transform: rotate(90deg); }

  /* ─── Commands ─── */
  .commands-list {
    display: none;
    padding: 6px 0 12px;
  }

  .tool-card.open .commands-list { display: block; }

  .cmd-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 10px;
    padding: 8px 18px;
    border-radius: 6px;
    margin: 0 8px;
    transition: background .12s;
  }

  .cmd-row:hover { background: var(--bg3); }

  .cmd-inner { overflow: hidden; }

  .cmd-desc {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: 'Syne', sans-serif;
  }

  .cmd-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    word-break: break-all;
    line-height: 1.6;
  }

  /* Highlight placeholder vars */
  .cmd-text .ph {
    color: var(--accent);
    font-weight: 700;
  }

  .cmd-text .ph.filled {
    color: var(--green);
  }

  .copy-btn {
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    margin-top: 2px;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(224,92,58,0.08);
  }

  .copy-btn.copied {
    border-color: var(--copied);
    color: var(--copied);
    background: rgba(58,220,138,0.08);
  }

  /* ─── Empty state ─── */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
  .empty p { font-size: 0.85rem; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-dot"></span>
      RedOps
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="searchInput" type="text" placeholder="search tools, commands, tags... (bloodyad, kerberos, smb...)" autocomplete="off" spellcheck="false" />
    </div>
  </div>
</header>

<div class="vars-bar">
  <div class="vars-inner">
    <div class="vars-label">⚡ Variables — used in all commands below</div>
    <div class="vars-grid">
      <div class="var-field">
        <label>IP / RHOST</label>
        <input type="text" id="var-IP" placeholder="10.10.10.10" />
      </div>
      <div class="var-field">
        <label>DOMAIN</label>
        <input type="text" id="var-DOMAIN" placeholder="corp.local" />
      </div>
      <div class="var-field">
        <label>USER</label>
        <input type="text" id="var-USER" placeholder="administrator" />
      </div>
      <div class="var-field">
        <label>PASS</label>
        <input type="text" id="var-PASS" placeholder="P@ssw0rd!" />
      </div>
      <div class="var-field">
        <label>HASH</label>
        <input type="text" id="var-HASH" placeholder="aad3b435b51404ee..." />
      </div>
      <div class="var-field">
        <label>PORT</label>
        <input type="text" id="var-PORT" placeholder="445" />
      </div>
      <div class="var-field">
        <label>TARGET_USER</label>
        <input type="text" id="var-TARGET_USER" placeholder="john.doe" />
      </div>
      <div class="var-field">
        <label>TARGET</label>
        <input type="text" id="var-TARGET" placeholder="DC01" />
      </div>
    </div>
  </div>
</div>

<main>
  <div class="results-meta" id="resultsMeta"></div>
  <div id="toolsContainer"></div>
</main>

<script>
let db = [];
let vars = {};

const VARS = ['IP','DOMAIN','USER','PASS','HASH','PORT','TARGET_USER','TARGET'];

// Load db.json
async function loadDB() {
  try {
    const res = await fetch('./db.json');
    db = await res.json();
    render();
  } catch (e) {
    document.getElementById('toolsContainer').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><h3>Could not load db.json</h3><p>Make sure db.json is in the same folder as index.html</p></div>';
  }
}

// Get current var values
function getVars() {
  const v = {};
  VARS.forEach(k => {
    const el = document.getElementById('var-' + k);
    v[k] = el ? el.value.trim() : '';
  });
  return v;
}

// Replace {{VAR}} in command string
function resolveCmd(cmd) {
  return cmd.replace(/\{\{(\w+)\}\}/g, (_, key) => vars[key] || `{{${key}}}`);
}

// Build highlighted HTML for a command
function buildCmdHTML(cmd) {
  return cmd.replace(/\{\{(\w+)\}\}/g, (_, key) => {
    const filled = vars[key] ? 'filled' : '';
    const val = vars[key] || `{{${key}}}`;
    return `<span class="ph ${filled}">${val}</span>`;
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  vars = getVars();
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const container = document.getElementById('toolsContainer');
  const meta = document.getElementById('resultsMeta');

  let filtered = db.map(tool => {
    if (!q) return { tool, matchedCmds: tool.commands };
    const toolMatch = tool.tool.toLowerCase().includes(q) || tool.tags.some(t => t.toLowerCase().includes(q));
    const matchedCmds = tool.commands.filter(c =>
      c.cmd.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q)
    );
    if (toolMatch) return { tool, matchedCmds: tool.commands };
    if (matchedCmds.length) return { tool, matchedCmds };
    return null;
  }).filter(Boolean);

  const totalCmds = filtered.reduce((a, t) => a + t.matchedCmds.length, 0);
  meta.innerHTML = q
    ? `<span>${filtered.length}</span> tools · <span>${totalCmds}</span> commands for "<strong style="color:var(--text)">${q}</strong>"`
    : `<span>${db.length}</span> tools · <span>${db.reduce((a,t)=>a+t.commands.length,0)}</span> commands`;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><h3>No results</h3><p>Try a different tool name, tag, or command keyword.</p></div>';
    return;
  }

  container.innerHTML = filtered.map(({ tool, matchedCmds }) => {
    const id = 'tool-' + tool.tool.replace(/[^a-z0-9]/gi,'');
    const cmdsHTML = matchedCmds.map((c, i) => {
      const resolved = resolveCmd(c.cmd);
      const highlighted = buildCmdHTML(escapeHtml(c.cmd));
      return `
        <div class="cmd-row">
          <div class="cmd-inner">
            <div class="cmd-desc">${c.desc}</div>
            <div class="cmd-text">${highlighted}</div>
          </div>
          <button class="copy-btn" onclick="copyCmd(this, ${JSON.stringify(resolved)})">copy</button>
        </div>`;
    }).join('');

    const tagsHTML = tool.tags.map(t => `<span class="tag">${t}</span>`).join('');

    return `
      <div class="tool-card open" id="${id}">
        <div class="tool-header" onclick="toggleCard('${id}')">
          <span class="tool-name">${tool.tool}</span>
          <div class="tool-tags">${tagsHTML}</div>
          <span class="tool-count">${matchedCmds.length} cmd${matchedCmds.length !== 1 ? 's' : ''}</span>
          <span class="chevron">▶</span>
        </div>
        <div class="commands-list">${cmdsHTML}</div>
      </div>`;
  }).join('');
}

function toggleCard(id) {
  document.getElementById(id)?.classList.toggle('open');
}

function copyCmd(btn, text) {
  const success = () => {
    btn.textContent = '✓ copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'copy';
      btn.classList.remove('copied');
    }, 1800);
  };

  // Modern clipboard API (HTTPS / localhost)
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(success).catch(() => fallbackCopy(text, success));
  } else {
    fallbackCopy(text, success);
  }
}

function fallbackCopy(text, onSuccess) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch (e) {
    console.error('Copy failed', e);
  }
  document.body.removeChild(ta);
}

// Bind inputs
document.getElementById('searchInput').addEventListener('input', render);
VARS.forEach(k => {
  const el = document.getElementById('var-' + k);
  if (el) el.addEventListener('input', render);
});

loadDB();
</script>
</body>
</html>
